<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Love Songs</title>
    <link rel="stylesheet" href="radio.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <meta name="theme-color" content="#28a745">
    <!--icons and og-image-->
    <link href="https://lovesongsapp.github.io/icons/favicon32.png" rel="shortcut icon" />
    <link href="https://lovesongsapp.github.io/icons/favicon.ico" rel="shortcut icon" />
    <link href="https://lovesongsapp.github.io/icons/favicon32.png" rel="icon" sizes="32x32" type="image/png" />
    <link href="https://lovesongsapp.github.io/icons/favicon16.png" rel="icon" sizes="16x16" type="image/png" />
    <!--AppleTouchIcon-->
    <link href="https://lovesongsapp.github.io/icons/icon76.png" rel="apple-touch-icon" sizes="76x76" />
    <link href="https://lovesongsapp.github.io/icons/icon120.png" rel="apple-touch-icon" sizes="120x120" />
    <link href="https://lovesongsapp.github.io/icons/icon152.png" rel="apple-touch-icon" sizes="152x152" />
    <link href="https://lovesongsapp.github.io/icons/icon180.png" rel="apple-touch-icon" sizes="180x180" />
    <link href="https://lovesongsapp.github.io/icons/icon512.png" rel="apple-touch-icon" sizes="512x512" />
    <link color="#fc6700" href="https://lovesongsapp.github.io/icons/safari-pinned-tab.svg" rel="mask-icon" />
    <!-- SEO | OG -->
    <meta content="yes" name="apple-mobile-web-app-capable" />
    <meta content="love songs, músicas internacionais anos 80 e 90" name="keywords" />
    <meta content="LoveSongs App" property="og:title" />
    <meta content="A trilha sonora do amor" property="og:description" />
    <meta content="https://lovesongsapp.github.io/og-image.jpg" property="og:image" />
    <meta content="website" property="og:type" />
    <meta content="LoveSongs App" property="og:site_name" />
    <meta content="yes" name="mobile-web-app-capable" />
</head>
<body>
    <header>
    <div class="menu-icon">
        <ion-icon name="menu"></ion-icon>
    </div>
    <div class="header-text">
        <h1>LOVE SONGS</h1>
        <p>A Trilha Sonora do Amor</p>
    </div>
    <div class="menu-icon">
        <ion-icon name="person-outline"></ion-icon>
    </div>
</header>

    
    <div class="player-container">
        <img id="album-art" src="logo.png" alt="Capa do Álbum">

        <h2 id="song-title">Nome da Música</h2>
        <p id="artist-name">Nome do Autor</p>
        
        <button id="playPauseBtn" class="play-button">
            <ion-icon name="play"></ion-icon>
        </button>
        
        <div class="actions">
            <button id="shareBtn">
                <ion-icon name="share-social-outline"></ion-icon>
                <p>Compartilhar</p>
            </button>
            <button id="donateBtn">
                <ion-icon name="heart-outline"></ion-icon>
                <p>Contribuir</p>
            </button>
        </div>

        <div class="copyright">
            waltemar.com.br | All Rights Reserved
            
        </div>

    </div>
    
<!--<script>
        // Prevenir o menu de contexto ao segurar o dedo na tela
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault(); // Impede o menu de contexto
        });
    </script>-->

    <audio id="audio" src="https://25233.live.streamtheworld.com/TLPSTR04.mp3"></audio>
    <script src="radio.js"></script>
    
</body>
</html>
