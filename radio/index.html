<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Love Songs</title>
    <link rel="stylesheet" href="css/radio.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <meta name="theme-color" content="#28a745">
    
</head>
<body>
    <header>
    <div class="menu-icon">
        <ion-icon name="menu"></ion-icon>
    </div>
    <div class="header-text">
        <h1>LOVE SONGS</h1>
        <p>A Trilha Sonora do Amor</p>
    </div>
    <div class="menu-icon">
        <ion-icon name="person-outline"></ion-icon>
    </div>
</header>

    
<div class="player-container">
    <!-- Imagem do Álbum -->
    <img id="album-art" src="./img/album.webp" alt="Capa do Álbum">
    
    <!-- Container que agrupa infos + controles -->
    <div class="content-container">
        <!-- Título e Artista -->
        <div class="info-container">
            <h2 id="song-title">Praying For Time</h2>
            <p id="artist-name">George Michael</p>
        </div>

        <!-- Botão de Play + Ações -->
        <div class="controls-container">
            <div align="center">
                <button id="playPauseBtn" class="play-button">
                    <ion-icon name="play"></ion-icon>
                </button>
            </div>
            <div class="actions">
                <button id="shareBtn">
                    <ion-icon name="arrow-redo-outline"></ion-icon>
                    <p>Compartilhe</p>
                </button>
                <button id="donateBtn">
                    <ion-icon name="heart-outline"></ion-icon>
                    <p>Contribua</p>
                </button>
            </div>
        </div>
    </div>

    <div class="copyright">
        Radio Love Songs
    </div>
</div>


    


    <audio id="audio" src="https://25233.live.streamtheworld.com/TLPSTR04.mp3"></audio>
    <script src="js/radio.js"></script>
    <!--<script src="menu-context"></script>-->
    
</body>
</html>
